language: en

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false

  path_filters:
    - "!releases/**"
    - "!dist/**"
    - "!build/**"
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!**/*.pkg"
    - "!**/*.deb"
    - "!**/*.rpm"
    - "!**/*.AppImage"
    - "!**/*.log"
    - "!editor.log"
    - "!editorlog.txt"
    - "!progress.log"
    - "!docs/**/*.pdf"
    - "!img/**"
    - "!packaging/linux/appimage/AppDirpackaging/**"
    - "!uv.lock"
    - "!thirdparty.lock"

  tools:
    ruff:
      enabled: true
    shellcheck:
      enabled: true
    hadolint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    actionlint:
      enabled: true
    gitleaks:
      enabled: true

chat:
  auto_reply: false

knowledge_base:
  opt_out: false
