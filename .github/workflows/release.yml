name: Release

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish Python distributions to PyPI. Keep false when the target version is already published."
        required: false
        default: "false"
      publish_github_release:
        description: "Create or update the GitHub Release and upload assets."
        required: false
        default: "true"
      build_assets:
        description: "Build release artifacts before publishing assets."
        required: false
        default: "true"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-python:
    name: Build Python distributions
    if: ${{ github.event_name == 'push' || github.event.inputs.build_assets != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Guard production runtime imports
        run: python3 scripts/check_runtime_imports.py

      - name: Build wheel and sdist
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade build twine
          VERSION=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          RELEASE_DIR="releases/${VERSION}"
          mkdir -p "${RELEASE_DIR}"
          python3 -m build --outdir "${RELEASE_DIR}"
          python3 -m twine check --strict \
            "${RELEASE_DIR}/ecli_editor-${VERSION}-py3-none-any.whl" \
            "${RELEASE_DIR}/ecli_editor-${VERSION}.tar.gz"
          (
            cd "${RELEASE_DIR}"
            sha256sum "ecli_editor-${VERSION}-py3-none-any.whl" > "ecli_editor-${VERSION}-py3-none-any.whl.sha256"
            sha256sum "ecli_editor-${VERSION}.tar.gz" > "ecli_editor-${VERSION}.tar.gz.sha256"
          )
          python3 -m pip install --user cyclonedx-bom
          python3 -m cyclonedx_py environment \
            --pyproject pyproject.toml \
            --sv 1.5 \
            --output-format json \
            --output-file "${RELEASE_DIR}/ecli-editor-${VERSION}.cdx.json" \
            --validate
          (cd "${RELEASE_DIR}" && sha256sum "ecli-editor-${VERSION}.cdx.json" > "ecli-editor-${VERSION}.cdx.json.sha256")
          ls -lh "${RELEASE_DIR}/"

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            releases/**/*.whl
            releases/**/*.whl.sha256
            releases/**/*.tar.gz
            releases/**/*.tar.gz.sha256
          if-no-files-found: error

      - name: Upload Python SBOM
        uses: actions/upload-artifact@v4
        with:
          name: python-sbom
          path: |
            releases/**/*.cdx.json
            releases/**/*.cdx.json.sha256
          if-no-files-found: error

  build-linux:
    name: Build Linux packages
    if: ${{ github.event_name == 'push' || github.event.inputs.build_assets != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux package build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cpio \
            file \
            libfuse2 \
            pacman-package-manager \
            rpm \
            ruby \
            ruby-dev
          sudo gem install --no-document fpm
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]" appimage-builder
          curl -fsSL \
            -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Build Linux archive
        run: |
          set -euo pipefail
          make package-tar-linux
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          release_dir="releases/${version}"
          install -m 0755 dist/ecli "${release_dir}/ecli_${version}_linux_x86_64.bin"
          (cd "${release_dir}" && sha256sum "ecli_${version}_linux_x86_64.bin" > "ecli_${version}_linux_x86_64.bin.sha256")

      - name: Build Debian package in Docker
        run: make package-deb-docker

      - name: Reset ownership after Docker DEB build
        run: |
          set -euo pipefail
          # Docker containers in package-deb-docker run as root and leave
          # root-owned files in build/, dist/, and releases/<version>/ (the deb
          # script writes releases/<version>/.linux.env and the .deb/.sha256 as
          # root). The next make targets run on the host under the runner user:
          # 'make clean' fails on root-owned build/dist, and 'make
          # package-opensuse-rpm' cannot rewrite releases/<version>/.linux.env.
          # Reset ownership of every Docker-touched output path (#93).
          if [ -d build ]; then sudo chown -R "$(id -u):$(id -g)" build/; fi
          if [ -d dist ]; then sudo chown -R "$(id -u):$(id -g)" dist/; fi
          if [ -d releases ]; then sudo chown -R "$(id -u):$(id -g)" releases/; fi

      - name: Build RPM package in Docker
        run: make package-rpm-docker

      - name: Reset ownership after Docker RPM build
        run: |
          set -euo pipefail
          # Mirror the DEB reset. The Docker RPM build writes root-owned files in
          # build/, dist/, and releases/<version>/ (including .linux.env). Reset
          # ownership so the host-side 'make package-opensuse-rpm' can rewrite
          # releases/<version>/.linux.env instead of hitting PermissionError (#93).
          if [ -d build ]; then sudo chown -R "$(id -u):$(id -g)" build/; fi
          if [ -d dist ]; then sudo chown -R "$(id -u):$(id -g)" dist/; fi
          if [ -d releases ]; then sudo chown -R "$(id -u):$(id -g)" releases/; fi

      - name: Build openSUSE RPM
        run: make package-opensuse-rpm

      - name: Build Arch package in Docker
        run: make package-arch-docker

      - name: Reset ownership after Docker Arch build
        run: |
          set -euo pipefail
          # makepkg refuses to run as root, so package-arch-docker builds as a
          # non-root user inside the Arch base-devel container and leaves
          # build-user-owned files in build/, dist/, and releases/<version>/. The
          # next host-side steps run as the runner user (package-slackware runs
          # 'make clean' over build/dist; package-appimage writes releases/), so
          # reset ownership of every Docker-touched output path (#93).
          if [ -d build ]; then sudo chown -R "$(id -u):$(id -g)" build/; fi
          if [ -d dist ]; then sudo chown -R "$(id -u):$(id -g)" dist/; fi
          if [ -d releases ]; then sudo chown -R "$(id -u):$(id -g)" releases/; fi

      - name: Build Slackware package
        run: make package-slackware

      - name: Build AppImage
        run: make package-appimage

      - name: Verify package contract
        run: |
          set -euo pipefail
          make package-deb-assert
          make package-rpm-assert
          make validate-appimage-contract
          make show-artifacts
          shopt -s globstar nullglob
          for sha in releases/**/*.sha256; do
            artifact="${sha%.sha256}"
            expected="$(awk '{print $1; exit}' "$sha")"
            actual="$(sha256sum "$artifact" | awk '{print $1}')"
            test "$actual" = "$expected"
            echo "Verified $artifact"
          done

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            releases/**/*.bin
            releases/**/*.bin.sha256
            releases/**/*.deb
            releases/**/*.deb.sha256
            releases/**/*.rpm
            releases/**/*.rpm.sha256
            releases/**/*.pkg.tar.zst
            releases/**/*.pkg.tar.zst.sha256
            releases/**/*.txz
            releases/**/*.txz.sha256
            releases/**/*.AppImage
            releases/**/*.AppImage.sha256
            releases/**/*.tar.gz
            releases/**/*.tar.gz.sha256
          if-no-files-found: error

  build-freebsd:
    name: Build FreeBSD package
    if: ${{ github.event_name == 'push' || github.event.inputs.build_assets != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build in FreeBSD 14.3 VM
        # Pinned to vmactions/freebsd-vm v1.4.5 by commit SHA so vmactions cannot
        # silently change SSH/qemu behavior between release reruns. Move the SHA
        # when we deliberately upgrade and confirm a green run on a release tag.
        uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6  # v1.4.5
        with:
          release: "14.3"
          usesh: true
          # 4 GiB was insufficient on prior runs once PyInstaller reached the
          # link phase under aiohttp+pygments. 6 GiB / 4 vCPU gives headroom
          # and is still within the GitHub-hosted runner envelope.
          mem: 6144
          cpu: 4
          sync: rsync
          copyback: true
          prepare: |
            set -eux
            env ASSUME_ALWAYS_YES=yes pkg update -f
            # Rust toolchain is required because libcst (a transitive
            # dependency) has no FreeBSD prebuilt wheel and must be
            # compiled from source. Other build essentials cover any
            # additional native deps that may need on-VM compilation.
            env ASSUME_ALWAYS_YES=yes pkg install -y bash rust pkgconf
            rustc --version
            cargo --version
          run: |
            set -eux
            PYTHON=python3.11 python3.11 ./scripts/build_and_package_freebsd.py 2>&1 | tee freebsd-build.log

      - name: Upload FreeBSD build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-build-log-${{ github.run_id }}
          path: |
            freebsd-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Verify FreeBSD artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(releases/*/ecli_*_freebsd_*.pkg)
          shas=(releases/*/ecli_*_freebsd_*.pkg.sha256)
          (( ${#pkgs[@]} == 1 ))
          (( ${#shas[@]} == 1 ))
          expected="$(awk '{print $1; exit}' "${shas[0]}")"
          actual="$(sha256sum "${pkgs[0]}" | awk '{print $1}')"
          test "$actual" = "$expected"
          echo "Verified ${pkgs[0]}"

      - name: Build FreeBSD ports/chroot evidence asset
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          evidence_dir="build/evidence/freebsd_ports_chroot"
          release_dir="releases/${version}"
          mkdir -p "$evidence_dir" "$release_dir"
          cp Makefile "$evidence_dir/"
          cp scripts/build_freebsd_port.py "$evidence_dir/"
          cp tools/freebsd-chroot-build.sh "$evidence_dir/"
          cp .github/workflows/freebsd-pkg.yml "$evidence_dir/"
          if [ -f freebsd-build.log ]; then cp freebsd-build.log "$evidence_dir/"; fi
          printf '%s\n' \
            "FreeBSD ports/chroot evidence for ECLI ${version}" \
            "Official release publication waits for this evidence asset." \
            "Standalone FreeBSD workflow output is validation evidence only." \
            > "$evidence_dir/README.txt"
          tar -czf "${release_dir}/ecli_${version}_freebsd_ports_chroot_evidence.tar.gz" \
            -C "build/evidence" freebsd_ports_chroot
          (cd "$release_dir" && sha256sum "ecli_${version}_freebsd_ports_chroot_evidence.tar.gz" > "ecli_${version}_freebsd_ports_chroot_evidence.tar.gz.sha256")

      - name: Upload FreeBSD package
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-pkg
          path: |
            releases/**/*.pkg
            releases/**/*.pkg.sha256
            releases/**/*freebsd_ports_chroot_evidence.tar.gz
            releases/**/*freebsd_ports_chroot_evidence.tar.gz.sha256
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    if: ${{ github.event_name == 'push' || github.event.inputs.build_assets != 'false' }}
    # macos-14 is selected for the Apple Silicon host needed to build the
    # arm64 leg natively; Rosetta provides the x86_64 leg for Universal2.
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rosetta for x86_64 build leg
        if: runner.arch == 'ARM64'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Build DMG
        run: ECLI_BUILD_MACOS_APP=1 make package-macos

      - name: Verify DMG
        run: |
          make package-macos-assert MACOS_ASSERT_MODE=structural
          make show-macos-artifacts

      - name: Build macOS app evidence asset
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          release_dir="releases/${version}"
          app_path="$(find build/macos_dmg -name ECLI.app -type d | head -n 1)"
          test -n "$app_path"
          tar -czf "${release_dir}/ecli_${version}_macos_universal2_app_evidence.tar.gz" \
            -C "$(dirname "$app_path")" "$(basename "$app_path")"
          (cd "$release_dir" && shasum -a 256 "ecli_${version}_macos_universal2_app_evidence.tar.gz" > "ecli_${version}_macos_universal2_app_evidence.tar.gz.sha256")

      - name: Upload macOS DMG and app evidence
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            releases/**/*.dmg
            releases/**/*.dmg.sha256
            releases/**/*macos_universal2_app_evidence.tar.gz
            releases/**/*macos_universal2_app_evidence.tar.gz.sha256
          if-no-files-found: error

  build-windows:
    name: Build Windows artifacts
    if: ${{ github.event_name == 'push' || github.event.inputs.build_assets != 'false' }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: "x64"

      - name: Install NSIS
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (-not (Test-Path (Join-Path $nsisPath "makensis.exe"))) {
            Write-Host "NSIS not pre-installed; installing via Chocolatey..."
            choco install nsis -y --no-progress
          } else {
            Write-Host "NSIS already pre-installed at $nsisPath"
          }
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath -Encoding utf8
          }
          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if (-not $makensis) {
            $candidate = Join-Path $nsisPath "makensis.exe"
            if (Test-Path $candidate) {
              $makensis = Get-Item -LiteralPath $candidate
            }
          }
          if (-not $makensis) { throw "makensis not found after install attempt" }
          $makensisPath = if ($makensis.Source) { $makensis.Source } else { $makensis.FullName }
          Write-Host "Using $makensisPath"
          & $makensisPath /VERSION

      - name: Build Windows artifacts
        shell: pwsh
        run: ./scripts/build-and-package-windows.ps1

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          $versionLine = Get-Content pyproject.toml | Where-Object { $_ -match '^\s*version\s*=\s*"(.*)"' } | Select-Object -First 1
          if ($versionLine -notmatch '^\s*version\s*=\s*"(.*)"') { throw "Cannot read version from pyproject.toml" }
          $version = $Matches[1]
          $artifacts = @(
            "releases\$version\ecli_${version}_win_x86_64.exe",
            "releases\$version\ecli_${version}_win_x86_64_setup.exe"
          )
          foreach ($exe in $artifacts) {
            $sha = "$exe.sha256"
            if (-not (Test-Path $exe)) { throw "Missing $exe" }
            if (-not (Test-Path $sha)) { throw "Missing $sha" }
            if ((Get-Item -LiteralPath $exe).Length -le 0) { throw "Empty EXE: $exe" }
            $expected = (Get-Content $sha -Raw).Trim().Split()[0].ToUpperInvariant()
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $exe).Hash.ToUpperInvariant()
            if ($actual -ne $expected) { throw "SHA256 mismatch for $exe" }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dual-artifacts
          path: |
            releases/**/*.exe
            releases/**/*.exe.sha256
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-python
      - build-linux
      - build-freebsd
      - build-macos
      - build-windows
    if: |
      always() &&
      needs.build-python.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-freebsd.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Report recovery PyPI policy
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_pypi != 'true' }}
        run: |
          echo "INFO: PyPI publish disabled for recovery run"

      - name: Verify PyPI namespace ownership
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_pypi == 'true' }}
        run: |
          set -e
          name=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["name"])')
          if [ "$name" != "ecli-editor" ]; then
            echo "::error::pyproject.toml [project].name is '$name', expected 'ecli-editor'."
            echo "::error::Reserved PyPI namespace is 'ecli-editor'. Either update pyproject.toml or reserve the new name first."
            exit 1
          fi
          lookup=$(python3 -m pip index versions ecli-editor 2>&1 || true)
          if ! echo "$lookup" | grep -q "Available versions"; then
            echo "::error::PyPI project 'ecli-editor' lookup failed. Network issue or namespace deletion?"
            echo "$lookup"
            exit 1
          fi
          echo "::notice::PyPI namespace ecli-editor confirmed. Current versions:"
          echo "$lookup"

      - name: Download Python distributions
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_pypi == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Normalize and verify PyPI distributions
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_pypi == 'true' }}
        run: |
          set -euo pipefail
          echo "Downloaded Python distribution artifact layout:"
          find dist -maxdepth 3 -type f -print | sort
          mkdir -p dist-flat
          find dist -maxdepth 3 -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist-flat/ \;
          rm -rf dist
          mkdir -p dist
          shopt -s nullglob
          dists=(dist-flat/*)
          if (( ${#dists[@]} == 0 )); then
            echo "::error::No wheel or sdist files found in downloaded python-dist artifact."
            exit 1
          fi
          mv "${dists[@]}" dist/
          echo "Flattened PyPI distribution layout:"
          find dist -maxdepth 1 -type f -print | sort
          python3 -m pip install --upgrade twine
          python3 -m twine check dist/*

      - name: Publish to PyPI
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_pypi == 'true' }}
        # Pinned from pypa/gh-action-pypi-publish release/v1 on 2026-05-10.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-python
      - build-linux
      - build-freebsd
      - build-macos
      - build-windows
    if: |
      always() &&
      (github.event_name == 'push' || github.event.inputs.publish_github_release != 'false') &&
      needs.build-python.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-freebsd.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-windows.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Read release metadata
        id: release_meta
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-inputs
          merge-multiple: true

      - name: Assemble and verify exact 21 GitHub Release assets
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          version="${{ steps.release_meta.outputs.version }}"
          release_dir="releases/${version}"
          rm -rf "$release_dir"
          mkdir -p "$release_dir/.checksums"

          copy_one() {
            local pattern="$1"
            local dest="$2"
            local matches=( $pattern )
            if (( ${#matches[@]} != 1 )); then
              echo "::error::Expected exactly one match for $pattern, found ${#matches[@]}"
              printf '%s\n' "${matches[@]}"
              exit 3
            fi
            cp "${matches[0]}" "$dest"
          }

          copy_one "release-inputs/**/ecli_editor-${version}-py3-none-any.whl" \
            "${release_dir}/01_pypi_wheel__ecli_editor-${version}-py3-none-any.whl"
          copy_one "release-inputs/**/ecli_editor-${version}.tar.gz" \
            "${release_dir}/02_pypi_sdist__ecli_editor-${version}.tar.gz"
          copy_one "release-inputs/**/ecli_${version}_linux_x86_64.bin" \
            "${release_dir}/03_linux_pyinstaller__ecli_${version}_linux_x86_64.bin"
          copy_one "release-inputs/**/ecli_${version}_linux_x86_64.tar.gz" \
            "${release_dir}/04_linux_tarball__ecli_${version}_linux_x86_64.tar.gz"
          copy_one "release-inputs/**/ecli_${version}_linux_x86_64.deb" \
            "${release_dir}/05_debian__ecli_${version}_linux_x86_64.deb"
          copy_one "release-inputs/**/ecli_${version}_linux_x86_64.rpm" \
            "${release_dir}/06_rpm__ecli_${version}_linux_x86_64.rpm"
          copy_one "release-inputs/**/ecli_${version}_opensuse_x86_64.rpm" \
            "${release_dir}/07_opensuse__ecli_${version}_opensuse_x86_64.rpm"
          copy_one "release-inputs/**/ecli_${version}_arch_x86_64.pkg.tar.zst" \
            "${release_dir}/08_arch__ecli_${version}_arch_x86_64.pkg.tar.zst"
          copy_one "release-inputs/**/ecli_${version}_slackware_x86_64.txz" \
            "${release_dir}/09_slackware__ecli_${version}_slackware_x86_64.txz"
          copy_one "release-inputs/**/ecli_${version}_linux_x86_64.AppImage" \
            "${release_dir}/10_appimage__ecli_${version}_linux_x86_64.AppImage"
          copy_one "release-inputs/**/ecli_${version}_freebsd_x86_64.pkg" \
            "${release_dir}/11_freebsd_pkg__ecli_${version}_freebsd_x86_64.pkg"
          copy_one "release-inputs/**/ecli_${version}_freebsd_ports_chroot_evidence.tar.gz" \
            "${release_dir}/12_freebsd_ports_chroot__ecli_${version}_freebsd_ports_chroot_evidence.tar.gz"
          copy_one "release-inputs/**/ecli_${version}_macos_universal2_app_evidence.tar.gz" \
            "${release_dir}/13_macos_app__ecli_${version}_macos_universal2_app_evidence.tar.gz"
          copy_one "release-inputs/**/ecli_${version}_macos_universal2.dmg" \
            "${release_dir}/14_macos_dmg__ecli_${version}_macos_universal2.dmg"
          copy_one "release-inputs/**/ecli_${version}_win_x86_64.exe" \
            "${release_dir}/15_windows_portable__ecli_${version}_win_x86_64.exe"
          copy_one "release-inputs/**/ecli_${version}_win_x86_64_setup.exe" \
            "${release_dir}/16_windows_nsis__ecli_${version}_win_x86_64_setup.exe"

          mkdir -p build/evidence/nix_flake build/evidence/nixos_package
          mkdir -p build/evidence/docker_deb_helper build/evidence/docker_rpm_helper
          mkdir -p build/evidence/workflow_contract
          cp flake.nix build/evidence/nix_flake/
          cp packaging/nix/package.nix build/evidence/nixos_package/
          cp docker/build-linux-deb.Dockerfile build/evidence/docker_deb_helper/
          cp docker/build-linux-rpm.Dockerfile build/evidence/docker_rpm_helper/
          cp -R .github/workflows build/evidence/workflow_contract/
          cp docs/release/artifact-contract.md build/evidence/workflow_contract/
          cp scripts/verify_release_assets.py build/evidence/workflow_contract/
          find release-inputs -maxdepth 5 -type f -print | sort \
            > build/evidence/workflow_contract/downloaded-workflow-artifacts.txt

          tar -czf "${release_dir}/17_nix_flake__ecli_${version}_nix_flake_evidence.tar.gz" \
            -C build/evidence nix_flake
          tar -czf "${release_dir}/18_nixos_package__ecli_${version}_nixos_package_evidence.tar.gz" \
            -C build/evidence nixos_package
          tar -czf "${release_dir}/19_docker_deb_helper__ecli_${version}_docker_deb_helper_evidence.tar.gz" \
            -C build/evidence docker_deb_helper
          tar -czf "${release_dir}/20_docker_rpm_helper__ecli_${version}_docker_rpm_helper_evidence.tar.gz" \
            -C build/evidence docker_rpm_helper
          tar -czf "${release_dir}/21_workflow_contract__ecli_${version}_workflow_contract_evidence.tar.gz" \
            -C build/evidence workflow_contract

          for asset in "$release_dir"/*; do
            test -f "$asset" || continue
            (cd "$release_dir" && sha256sum "$(basename "$asset")" > ".checksums/$(basename "$asset").sha256")
          done

          python3 scripts/verify_release_assets.py --version "$version"
          find "$release_dir" -maxdepth 1 -type f -print | sort
          find "$release_dir/.checksums" -maxdepth 1 -type f -print | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.release_meta.outputs.tag, '-') }}
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            ECLI release artifacts for ${{ steps.release_meta.outputs.tag }}.

            This official release publishes exactly 21 physical GitHub Release
            assets, one per canonical matrix entry. Checksum sidecars are
            mandatory verification evidence under `.checksums/` during CI, but
            are not uploaded as GitHub Release assets.
          files: releases/${{ steps.release_meta.outputs.version }}/[0-9][0-9]_*
