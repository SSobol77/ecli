name: Release

"on":
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-python:
    name: Build Python distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build
          ls -lh dist/

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Linux archive
        run: make package-tar-linux

      - name: Build Debian package in Docker
        run: make package-deb-docker

      - name: Build RPM package in Docker
        run: make package-rpm-docker

      - name: Verify package contract
        run: |
          set -euo pipefail
          make package-deb-assert
          make package-rpm-assert
          make show-artifacts
          shopt -s globstar nullglob
          for sha in releases/**/*.sha256; do
            artifact="${sha%.sha256}"
            expected="$(awk '{print $1; exit}' "$sha")"
            actual="$(sha256sum "$artifact" | awk '{print $1}')"
            test "$actual" = "$expected"
            echo "Verified $artifact"
          done

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            releases/**/*.deb
            releases/**/*.deb.sha256
            releases/**/*.rpm
            releases/**/*.rpm.sha256
            releases/**/*.tar.gz
            releases/**/*.tar.gz.sha256
          if-no-files-found: error

  build-freebsd:
    name: Build FreeBSD package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build in FreeBSD 14.3 VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          mem: 4096
          cpu: 2
          sync: rsync
          copyback: true
          prepare: |
            set -eux
            env ASSUME_ALWAYS_YES=yes pkg update -f
          run: |
            set -eux
            sh ./scripts/build-and-package-freebsd.sh

      - name: Verify FreeBSD artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(releases/*/ecli_*_freebsd_*.pkg)
          shas=(releases/*/ecli_*_freebsd_*.pkg.sha256)
          (( ${#pkgs[@]} == 1 ))
          (( ${#shas[@]} == 1 ))
          expected="$(awk '{print $1; exit}' "${shas[0]}")"
          actual="$(sha256sum "${pkgs[0]}" | awk '{print $1}')"
          test "$actual" = "$expected"
          echo "Verified ${pkgs[0]}"

      - name: Upload FreeBSD package
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-pkg
          path: |
            releases/**/*.pkg
            releases/**/*.pkg.sha256
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-13
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build DMG
        run: make package-macos

      - name: Verify DMG
        run: |
          make package-macos-assert
          make show-macos-artifacts

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            releases/**/*.dmg
            releases/**/*.dmg.sha256
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: "x64"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        run: ./scripts/build-and-package-windows.ps1

      - name: Verify installer
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path releases -Recurse -Filter "ecli_*_win_x86_64.exe"
          if ($artifacts.Count -ne 1) { throw "Expected exactly one Windows installer, found $($artifacts.Count)" }
          $exe = $artifacts[0].FullName
          $sha = "$exe.sha256"
          if (-not (Test-Path $sha)) { throw "Missing $sha" }
          $expected = (Get-Content $sha -Raw).Trim().Split()[0].ToUpperInvariant()
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $exe).Hash.ToUpperInvariant()
          if ($actual -ne $expected) { throw "SHA256 mismatch for $exe" }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            releases/**/*.exe
            releases/**/*.exe.sha256
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-python]
    environment:
      name: pypi
      url: https://pypi.org/p/ecli
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.10.3
        with:
          attestations: false

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-python
      - build-linux
      - build-freebsd
      - build-macos
      - build-windows
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 4 -type f -print | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
