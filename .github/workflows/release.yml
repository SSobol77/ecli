name: Release

"on":
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-python:
    name: Build Python distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Guard production runtime imports
        run: python3 scripts/check_runtime_imports.py

      - name: Build wheel and sdist
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade build twine
          VERSION=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          RELEASE_DIR="releases/${VERSION}"
          mkdir -p "${RELEASE_DIR}"
          python3 -m build --outdir "${RELEASE_DIR}"
          python3 -m twine check --strict \
            "${RELEASE_DIR}/ecli_editor-${VERSION}-py3-none-any.whl" \
            "${RELEASE_DIR}/ecli_editor-${VERSION}.tar.gz"
          python3 -m pip install --user cyclonedx-bom
          python3 -m cyclonedx_py environment \
            --pyproject pyproject.toml \
            --sv 1.5 \
            --output-format json \
            --output-file "${RELEASE_DIR}/ecli-editor-${VERSION}.cdx.json" \
            --validate
          (cd "${RELEASE_DIR}" && sha256sum "ecli-editor-${VERSION}.cdx.json" > "ecli-editor-${VERSION}.cdx.json.sha256")
          ls -lh "${RELEASE_DIR}/"

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            releases/**/*.whl
            releases/**/*.tar.gz
          if-no-files-found: error

      - name: Upload Python SBOM
        uses: actions/upload-artifact@v4
        with:
          name: python-sbom
          path: |
            releases/**/*.cdx.json
            releases/**/*.cdx.json.sha256
          if-no-files-found: error

  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux package build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm cpio
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Build Linux archive
        run: make package-tar-linux

      - name: Build Debian package in Docker
        run: make package-deb-docker

      - name: Reset ownership after Docker DEB build
        run: |
          set -euo pipefail
          # Docker containers in package-deb-docker run as root and leave
          # root-owned files in build/ and dist/. The next make target invokes
          # 'make clean' on the host under the runner user, which fails on
          # root-owned paths. Reset ownership defensively before continuing.
          if [ -d build ]; then sudo chown -R "$(id -u):$(id -g)" build/; fi
          if [ -d dist ]; then sudo chown -R "$(id -u):$(id -g)" dist/; fi

      - name: Build RPM package in Docker
        run: make package-rpm-docker

      - name: Verify package contract
        run: |
          set -euo pipefail
          make package-deb-assert
          make package-rpm-assert
          make show-artifacts
          shopt -s globstar nullglob
          for sha in releases/**/*.sha256; do
            artifact="${sha%.sha256}"
            expected="$(awk '{print $1; exit}' "$sha")"
            actual="$(sha256sum "$artifact" | awk '{print $1}')"
            test "$actual" = "$expected"
            echo "Verified $artifact"
          done

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            releases/**/*.deb
            releases/**/*.deb.sha256
            releases/**/*.rpm
            releases/**/*.rpm.sha256
            releases/**/*.tar.gz
            releases/**/*.tar.gz.sha256
          if-no-files-found: error

  build-freebsd:
    name: Build FreeBSD package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build in FreeBSD 14.3 VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          mem: 4096
          cpu: 2
          sync: rsync
          copyback: true
          prepare: |
            set -eux
            env ASSUME_ALWAYS_YES=yes pkg update -f
            # Rust toolchain is required because libcst (a transitive
            # dependency) has no FreeBSD prebuilt wheel and must be
            # compiled from source. Other build essentials cover any
            # additional native deps that may need on-VM compilation.
            env ASSUME_ALWAYS_YES=yes pkg install -y bash rust pkgconf
            rustc --version
            cargo --version
          run: |
            set -eux
            PYTHON=python3.11 sh ./scripts/build-and-package-freebsd.sh

      - name: Verify FreeBSD artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=(releases/*/ecli_*_freebsd_*.pkg)
          shas=(releases/*/ecli_*_freebsd_*.pkg.sha256)
          (( ${#pkgs[@]} == 1 ))
          (( ${#shas[@]} == 1 ))
          expected="$(awk '{print $1; exit}' "${shas[0]}")"
          actual="$(sha256sum "${pkgs[0]}" | awk '{print $1}')"
          test "$actual" = "$expected"
          echo "Verified ${pkgs[0]}"

      - name: Upload FreeBSD package
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-pkg
          path: |
            releases/**/*.pkg
            releases/**/*.pkg.sha256
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    # macos-14 is selected for the Apple Silicon host needed to build the
    # arm64 leg natively; Rosetta provides the x86_64 leg for Universal2.
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rosetta for x86_64 build leg
        if: runner.arch == 'ARM64'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Build DMG
        run: make package-macos

      - name: Verify DMG
        run: |
          make package-macos-assert MACOS_ASSERT_MODE=structural
          make show-macos-artifacts

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            releases/**/*.dmg
            releases/**/*.dmg.sha256
          if-no-files-found: error

  build-windows:
    name: Build Windows artifacts
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: "x64"

      - name: Install NSIS
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (-not (Test-Path (Join-Path $nsisPath "makensis.exe"))) {
            Write-Host "NSIS not pre-installed; installing via Chocolatey..."
            choco install nsis -y --no-progress
          } else {
            Write-Host "NSIS already pre-installed at $nsisPath"
          }
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath -Encoding utf8
          }
          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if (-not $makensis) {
            $candidate = Join-Path $nsisPath "makensis.exe"
            if (Test-Path $candidate) {
              $makensis = Get-Item -LiteralPath $candidate
            }
          }
          if (-not $makensis) { throw "makensis not found after install attempt" }
          $makensisPath = if ($makensis.Source) { $makensis.Source } else { $makensis.FullName }
          Write-Host "Using $makensisPath"
          & $makensisPath /VERSION

      - name: Build Windows artifacts
        shell: pwsh
        run: ./scripts/build-and-package-windows.ps1

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          $versionLine = Get-Content pyproject.toml | Where-Object { $_ -match '^\s*version\s*=\s*"(.*)"' } | Select-Object -First 1
          if ($versionLine -notmatch '^\s*version\s*=\s*"(.*)"') { throw "Cannot read version from pyproject.toml" }
          $version = $Matches[1]
          $artifacts = @(
            "releases\$version\ecli_${version}_win_x86_64.exe",
            "releases\$version\ecli_${version}_win_x86_64_setup.exe"
          )
          foreach ($exe in $artifacts) {
            $sha = "$exe.sha256"
            if (-not (Test-Path $exe)) { throw "Missing $exe" }
            if (-not (Test-Path $sha)) { throw "Missing $sha" }
            if ((Get-Item -LiteralPath $exe).Length -le 0) { throw "Empty EXE: $exe" }
            $expected = (Get-Content $sha -Raw).Trim().Split()[0].ToUpperInvariant()
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $exe).Hash.ToUpperInvariant()
            if ($actual -ne $expected) { throw "SHA256 mismatch for $exe" }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dual-artifacts
          path: |
            releases/**/*.exe
            releases/**/*.exe.sha256
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-python]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify PyPI namespace ownership
        run: |
          set -e
          name=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["name"])')
          if [ "$name" != "ecli-editor" ]; then
            echo "::error::pyproject.toml [project].name is '$name', expected 'ecli-editor'."
            echo "::error::Reserved PyPI namespace is 'ecli-editor'. Either update pyproject.toml or reserve the new name first."
            exit 1
          fi
          lookup=$(python3 -m pip index versions ecli-editor 2>&1 || true)
          if ! echo "$lookup" | grep -q "Available versions"; then
            echo "::error::PyPI project 'ecli-editor' lookup failed. Network issue or namespace deletion?"
            echo "$lookup"
            exit 1
          fi
          echo "::notice::PyPI namespace ecli-editor confirmed. Current versions:"
          echo "$lookup"

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Normalize and verify PyPI distributions
        run: |
          set -euo pipefail
          echo "Downloaded Python distribution artifact layout:"
          find dist -maxdepth 3 -type f -print | sort
          mkdir -p dist-flat
          find dist -maxdepth 3 -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist-flat/ \;
          rm -rf dist
          mkdir -p dist
          shopt -s nullglob
          dists=(dist-flat/*)
          if (( ${#dists[@]} == 0 )); then
            echo "::error::No wheel or sdist files found in downloaded python-dist artifact."
            exit 1
          fi
          mv "${dists[@]}" dist/
          echo "Flattened PyPI distribution layout:"
          find dist -maxdepth 1 -type f -print | sort
          python3 -m pip install --upgrade twine
          python3 -m twine check dist/*

      - name: Publish to PyPI
        # Pinned from pypa/gh-action-pypi-publish release/v1 on 2026-05-10.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-python
      - build-linux
      - build-freebsd
      - build-macos
      - build-windows
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 4 -type f -print | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ECLI release artifacts for ${{ github.ref_name }}.

            This release includes a CycloneDX SBOM for the Python distribution:
            `ecli-editor-<version>.cdx.json`, plus a SHA256 sidecar.

            The SBOM is generated by the `cyclonedx-bom` package through the
            `cyclonedx_py` module in CycloneDX JSON schema version 1.5.
          files: release-assets/**/*
