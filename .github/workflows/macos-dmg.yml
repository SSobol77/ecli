name: macOS DMG

"on":
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/macos-dmg.yml"
      - "src/**"
      - "scripts/build-and-package-macos.sh"
      - "ecli.spec"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build DMG
        run: |
          make package-macos

      - name: Verify artifact contract
        run: |
          make package-macos-assert
          make show-macos-artifacts

      - name: Read version
        id: ver
        run: |
          VER=$(awk -F'"' '/^[[:space:]]*version[[:space:]]*=/ {print $2; exit}' pyproject.toml)
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            releases/${{ steps.ver.outputs.version }}/ecli_${{ steps.ver.outputs.version }}_macos_*.dmg
            releases/${{ steps.ver.outputs.version }}/ecli_${{ steps.ver.outputs.version }}_macos_*.dmg.sha256
          if-no-files-found: error
