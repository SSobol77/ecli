name: Project Column Automation

"on":
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested, closed]
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  move-card:
    runs-on: ubuntu-latest
    steps:
      - name: Move PR to "In Progress"
        if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened')
        uses: alex-page/github-project-automation-plus@v0.8.3
        with:
          project: Ecli
          column: "🔧 In Progress"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move PR to "Contract Review"
        if: github.event_name == 'pull_request' && (github.event.action == 'ready_for_review' || github.event.action == 'review_requested')
        uses: alex-page/github-project-automation-plus@v0.8.3
        with:
          project: Ecli
          column: "👀 Contract Review"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move merged PR to "Gate 2 Passed"
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: alex-page/github-project-automation-plus@v0.8.3
        with:
          project: Ecli
          column: "🎉 Gate 2 Passed"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move issue to "QA" when qa label is added
        if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'qa'
        uses: alex-page/github-project-automation-plus@v0.8.3
        with:
          project: Ecli
          column: "✅ QA"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
