name: FreeBSD 14 .pkg

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag (e.g. v0.2.2). When set, the built .pkg is attached to that GitHub Release out-of-band via 'gh release upload --clobber'."
        required: false
        default: ""
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/freebsd-pkg.yml"
      - "src/**"
      - "packaging/**"
      - "scripts/build-and-package-freebsd.sh"
      - "scripts/check_runtime_imports.py"
      - "scripts/verify_runtime.sh"
      - "ecli.spec"
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  build-freebsd-pkg:
    runs-on: ubuntu-latest
    name: "Build FreeBSD 14.3 .pkg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build in FreeBSD 14.3 VM
        # Pinned to vmactions/freebsd-vm v1.4.5 by commit SHA; mirrors
        # release.yml so both workflows share the same vmactions revision.
        uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6  # v1.4.5
        with:
          release: "14.3"
          usesh: true
          mem: 6144
          cpu: 4
          sync: rsync
          copyback: true
          prepare: |
            set -eux
            env ASSUME_ALWAYS_YES=yes pkg update -f
            env ASSUME_ALWAYS_YES=yes pkg install -y bash rust pkgconf
          run: |
            set -eux
            sh ./scripts/build-and-package-freebsd.sh 2>&1 | tee freebsd-build.log

      - name: Upload FreeBSD build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-build-log-${{ github.run_id }}
          path: freebsd-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Find built .pkg and checksum
        id: find_pkg
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t PKGS < <(ls -1 releases/*/ecli_*_freebsd_*.pkg 2>/dev/null || true)
          mapfile -t SHAS < <(ls -1 releases/*/ecli_*_freebsd_*.pkg.sha256 2>/dev/null || true)
          if (( ${#PKGS[@]} == 0 )); then
            echo "No .pkg files found under releases/**/ — build failed or copyback disabled" >&2
            exit 2
          fi
          if (( ${#SHAS[@]} == 0 )); then
            echo "No .pkg.sha256 files found under releases/**/" >&2
            exit 3
          fi
          echo "pkg_path=${PKGS[-1]}" >> "$GITHUB_OUTPUT"
          echo "checksum_path=${SHAS[-1]}" >> "$GITHUB_OUTPUT"
          echo "Found package: ${PKGS[-1]}"
          echo "Found checksum: ${SHAS[-1]}"

      - name: Verify checksum
        shell: bash
        run: |
          set -euo pipefail
          PKG="${{ steps.find_pkg.outputs.pkg_path }}"
          SHA="${{ steps.find_pkg.outputs.checksum_path }}"
          expected="$(awk '{print $1; exit}' "$SHA")"
          actual="$(sha256sum "$PKG" | awk '{print $1}')"
          test "$actual" = "$expected"
          echo "Verified $PKG"

      - name: Upload artifact (.pkg and checksum)
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-pkg
          path: |
            ${{ steps.find_pkg.outputs.pkg_path }}
            ${{ steps.find_pkg.outputs.checksum_path }}
          if-no-files-found: error

      - name: Attach FreeBSD .pkg to GitHub Release (out-of-band)
        # When the standalone workflow is dispatched with `release_tag` set,
        # the freshly built .pkg + .sha256 are uploaded to that release with
        # --clobber. This is the post-hoc attach path when the Release workflow
        # publishes without FreeBSD due to a vmactions flake.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          PKG_PATH: ${{ steps.find_pkg.outputs.pkg_path }}
          SHA_PATH: ${{ steps.find_pkg.outputs.checksum_path }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG does not exist; cannot attach FreeBSD .pkg out-of-band"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "$PKG_PATH" "$SHA_PATH" --clobber
          echo "Attached $PKG_PATH and $SHA_PATH to $RELEASE_TAG"
