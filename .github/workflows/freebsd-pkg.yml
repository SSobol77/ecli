name: FreeBSD 14 .pkg

"on":
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/freebsd-pkg.yml"
      - "src/**"
      - "packaging/**"
      - "scripts/build_and_package_freebsd.py"
      - "scripts/check_runtime_imports.py"
      - "scripts/verify_runtime.py"
      - "ecli.spec"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  build-freebsd-pkg:
    runs-on: ubuntu-latest
    name: "Build FreeBSD 14.3 .pkg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build in FreeBSD 14.3 VM
        # Pinned to vmactions/freebsd-vm v1.4.5 by commit SHA; mirrors
        # release.yml so both workflows share the same vmactions revision.
        uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6  # v1.4.5
        with:
          release: "14.3"
          usesh: true
          mem: 6144
          cpu: 4
          sync: rsync
          copyback: true
          prepare: |
            set -eux
            env ASSUME_ALWAYS_YES=yes pkg update -f
            env ASSUME_ALWAYS_YES=yes pkg install -y bash rust pkgconf
          run: |
            set -eux
            python3.11 ./scripts/build_and_package_freebsd.py 2>&1 | tee freebsd-build.log

      - name: Upload FreeBSD build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-build-log-${{ github.run_id }}
          path: freebsd-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Find built .pkg and checksum
        id: find_pkg
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t PKGS < <(ls -1 releases/*/ecli_*_freebsd_*.pkg 2>/dev/null || true)
          mapfile -t SHAS < <(ls -1 releases/*/ecli_*_freebsd_*.pkg.sha256 2>/dev/null || true)
          if (( ${#PKGS[@]} == 0 )); then
            echo "No .pkg files found under releases/**/ — build failed or copyback disabled" >&2
            exit 2
          fi
          if (( ${#SHAS[@]} == 0 )); then
            echo "No .pkg.sha256 files found under releases/**/" >&2
            exit 3
          fi
          echo "pkg_path=${PKGS[-1]}" >> "$GITHUB_OUTPUT"
          echo "checksum_path=${SHAS[-1]}" >> "$GITHUB_OUTPUT"
          echo "Found package: ${PKGS[-1]}"
          echo "Found checksum: ${SHAS[-1]}"

      - name: Verify checksum
        shell: bash
        run: |
          set -euo pipefail
          PKG="${{ steps.find_pkg.outputs.pkg_path }}"
          SHA="${{ steps.find_pkg.outputs.checksum_path }}"
          expected="$(awk '{print $1; exit}' "$SHA")"
          actual="$(sha256sum "$PKG" | awk '{print $1}')"
          test "$actual" = "$expected"
          echo "Verified $PKG"

      - name: Upload artifact (.pkg and checksum)
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-pkg
          path: |
            ${{ steps.find_pkg.outputs.pkg_path }}
            ${{ steps.find_pkg.outputs.checksum_path }}
          if-no-files-found: error

      - name: Report official release gating policy
        run: |
          echo "Standalone FreeBSD workflow output is validation evidence only."
          echo "Official GitHub Release publication waits for the aggregate Release workflow and exact 21-asset verifier."
