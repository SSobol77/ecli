name: macOS Contract Validate

"on":
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/macos-validate.yml"
      - "Makefile"
      - "pyproject.toml"
      - "scripts/build-and-package-macos.sh"
      - "scripts/check_runtime_imports.py"
      - "scripts/verify_runtime.sh"
      - "packaging/pyinstaller/ecli.spec"
      - "src/**"
      - "packaging/**"
      - "img/**"

permissions:
  contents: read

concurrency:
  group: macos-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # macos-14 is selected for Apple Silicon plus Rosetta Universal2 coverage.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rosetta for x86_64 build leg
        if: runner.arch == 'ARM64'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine pyinstaller

      - name: Build macOS DMG
        run: make package-macos

      - name: Validate macOS contract
        run: |
          make validate-macos-contract MACOS_ASSERT_MODE=structural
          make show-macos-artifacts
