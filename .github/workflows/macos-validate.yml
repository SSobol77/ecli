name: macOS Contract Validate

"on":
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/macos-validate.yml"
      - "Makefile"
      - "pyproject.toml"
      - "scripts/build-and-package-macos.sh"
      - "src/**"
      - "packaging/**"
      - "img/**"

permissions:
  contents: read

concurrency:
  group: macos-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine pyinstaller

      - name: Build macOS DMG
        run: make package-macos

      - name: Validate macOS contract
        run: make validate-macos-contract
