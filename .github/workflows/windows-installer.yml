name: Windows Installer

"on":
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/windows-installer.yml"
      - "src/**"
      - "scripts/build-and-package-windows.ps1"
      - "packaging/windows/nsis/**"
      - "ecli.spec"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Installer
        shell: pwsh
        run: |
          ./scripts/build-and-package-windows.ps1

      - name: Read version
        id: ver
        shell: bash
        run: |
          VER=$(awk -F'"' '/^[[:space:]]*version[[:space:]]*=/ {print $2; exit}' pyproject.toml)
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Verify artifact contract
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $exe = "releases\$version\ecli_${version}_win_x86_64.exe"
          $sha = "$exe.sha256"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          if (-not (Test-Path $sha)) { throw "Missing $sha" }
          $expected = (Get-Content $sha -Raw).Trim().Split()[0].ToUpperInvariant()
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $exe).Hash.ToUpperInvariant()
          if ($actual -ne $expected) { throw "SHA256 mismatch for $exe" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            releases/${{ steps.ver.outputs.version }}/ecli_${{ steps.ver.outputs.version }}_win_x86_64.exe
            releases/${{ steps.ver.outputs.version }}/ecli_${{ steps.ver.outputs.version }}_win_x86_64.exe.sha256
          if-no-files-found: error
